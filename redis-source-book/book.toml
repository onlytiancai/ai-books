[book]
title = "Redis 2.0.0 源码解读"
authors = ["Redis Source Reader"]
language = "zh-CN"
multilingual = false
src = "src"
description = "深入解读 Redis 2.0.0 源码，循序渐进地学习 Redis 的设计与实现"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/antirez/redis"
edit-url-template = "https://github.com/antirez/redis/edit/unstable/{path}"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.print]
enable = true

[output.html.fold]
enable = true
level = 1