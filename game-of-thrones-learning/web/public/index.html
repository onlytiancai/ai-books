<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Thrones - Bilingual Reader</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <span id="chapter-info">Chapter: -</span>
    </div>
    <div class="header-center">
      <button id="prev-btn" class="nav-btn">← Prev</button>
      <span id="page-info">- / -</span>
      <button id="next-btn" class="nav-btn">Next →</button>
    </div>
    <div class="header-right">
      <button id="login-btn" class="login-btn">Login</button>
      <div id="user-menu" class="user-menu" style="display: none;">
        <button id="user-menu-btn" class="user-menu-btn">
          <span id="username-display"></span>
          <span id="admin-badge" class="admin-badge" style="display: none;">ADMIN</span>
          <span class="dropdown-arrow">▼</span>
        </button>
        <div id="user-dropdown" class="user-dropdown" style="display: none;">
          <a href="#" id="favorites-link">⭐ Favorites</a>
          <button id="logout-btn">Logout</button>
        </div>
      </div>
      <label class="toggle-label">
        <input type="checkbox" id="show-translation" checked>
        <span>Translation</span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="show-notes" checked>
        <span>Notes</span>
      </label>
      <button id="bookmark-btn" class="bookmark-btn" title="Save current position as bookmark">🔖</button>
      <span id="bookmark-info" class="bookmark-info" style="display: none;"></span>
    </div>
  </header>

  <main class="content" id="content">
    <div class="loading">Loading...</div>
  </main>

  <footer class="footer">
    <label>
      Lines per page:
      <select id="page-size">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </label>
    <span>Jump to line: <input type="number" id="jump-input" min="0" value="0"></span>
    <button id="jump-btn">Go</button>
  </footer>

  <!-- Floating stop button for TTS -->
  <button id="stop-speaking-btn" class="stop-speaking-btn" style="display: none;">
    🔇 Stop Reading
  </button>

  <!-- Auth Modal -->
  <div id="auth-modal" class="auth-modal">
    <div class="auth-modal-content">
      <button class="auth-modal-close" onclick="closeAuthModal()">✕</button>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <h2>Login</h2>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required minlength="6" autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit-btn">Login</button>
        <p class="auth-switch">
          Don't have an account?
          <a href="#" id="toggle-auth-form">Register</a>
        </p>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form" style="display: none;">
        <h2>Register</h2>
        <div class="form-group">
          <label for="register-username">Username</label>
          <input type="text" id="register-username" required minlength="3" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="register-password">Password</label>
          <input type="password" id="register-password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="register-password-hint">Password Hint (optional)</label>
          <input type="text" id="register-password-hint" autocomplete="off">
        </div>
        <button type="submit" class="auth-submit-btn">Register</button>
        <p class="auth-switch">
          Already have an account?
          <a href="#" id="toggle-auth-form">Login</a>
        </p>
      </form>

      <div id="auth-error" class="auth-error"></div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
